<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Cadastrar Currículo | Emprega Brasil</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Cadastrar Currículo</h1>
    <form action="/salvar-curriculo" method="POST">
        <label>Nome Completo:</label><br>
        <input type="text" name="nome" required><br><br>
        
        <label>Cargo Desejado:</label><br>
        <input type="text" name="cargo" required><br><br>
        
        <label>Resumo Profissional:</label><br>
        <textarea name="resumo" rows="4" cols="30"></textarea><br><br>
        
        <button type="submit">Enviar Currículo</button>
    </form>
    <br>
    <a href="index.html">Voltar para a página inicial</a>
</body>
</html>
